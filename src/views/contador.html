<!--
  contador.html — Vista Broadcast: Contador Regresivo
  ─────────────────────────────────────────────────────────────
  Archivo autocontenido. Puede abrirse directamente en el navegador.
  Optimizado para pantalla LED 1920×1080 (3×2 m).
-->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920" />
  <title>KDO OPEN — Contador Regresivo</title>

  <!-- Poppins: fuente principal del broadcast -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles/contador.css" />
</head>
<body>

<div class="ct-wrapper" id="ct-wrapper">

  <!-- Badge de estado -->
  <div class="ct-badge" id="ct-badge">LISTO</div>

  <!-- Display principal del tiempo -->
  <div class="ct-display">
    <div class="ct-time" id="ct-time">05:00</div>
  </div>

  <!-- Configuración (solo visible en estado LISTO) -->
  <div class="ct-config" id="ct-config">
    <label for="ct-input" class="ct-config-label">Duración</label>
    <div class="ct-config-row">
      <input
        type="number"
        id="ct-input"
        class="ct-input"
        min="1"
        max="99"
        value="5"
        aria-label="Duración en minutos"
      />
      <span class="ct-input-unit">min</span>
    </div>
  </div>

  <!-- Controles -->
  <div class="ct-controls">
    <button class="ct-btn ct-btn--primary" id="btn-iniciar">
      <span class="ct-btn-icon" aria-hidden="true">▶</span>
      INICIAR
    </button>
    <button class="ct-btn ct-btn--secondary" id="btn-pausar" disabled>
      <span class="ct-btn-icon" aria-hidden="true">⏸</span>
      PAUSAR
    </button>
    <button class="ct-btn ct-btn--ghost" id="btn-reiniciar">
      <span class="ct-btn-icon" aria-hidden="true">↺</span>
      REINICIAR
    </button>
  </div>

  <!-- Atajos de teclado -->
  <div class="ct-hints" aria-hidden="true">
    <span>Enter → Iniciar</span>
    <span class="ct-hints-sep">·</span>
    <span>Espacio → Pausar</span>
    <span class="ct-hints-sep">·</span>
    <span>R → Reiniciar</span>
  </div>

</div>

<script src="../js/contador-view.js"></script>
</body>
</html>
