<!--
  agenda.html — Vista Broadcast: Agenda del Evento
  ─────────────────────────────────────────────────
  Archivo autocontenido. Puede abrirse directamente en el navegador.
  Optimizado para pantalla LED 1920×1080 (3×2 m).

  Integración con el dashboard:
    • Los estilos .agenda-* también viven en main.css
    • agenda.js inyecta este mismo markup en <section id="agenda">
-->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920" />
  <title>KDO OPEN — Agenda Oficial</title>

  <!-- Poppins: fuente principal del broadcast -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles/agenda.css" />

</head>
<body>

<div class="ag-wrapper">

  <!-- ════════════════════════════════════════════════════════════
       HEADER
       ════════════════════════════════════════════════════════════ -->
  <header class="ag-header">

    <div class="ag-brand">
      <div class="ag-brand-logo-wrap">
        <img src="../../public/assets/logo/KDO-08.png" alt="KDO" class="ag-brand-logo" />
      </div>
      <div class="ag-brand-text">
        <div class="ag-event-name">KDO <em>OPEN</em></div>
        <div class="ag-event-sub">Programa Oficial del Torneo</div>
      </div>
    </div>

    <div class="ag-tabs" role="tablist" aria-label="Seleccionar jornada">
      <button class="ag-tab active"
              id="tab-matutino"
              role="tab"
              aria-selected="true"
              aria-controls="panel-matutino"
              onclick="agSwitchTab('matutino')">Matutino</button>
      <button class="ag-tab"
              id="tab-vespertino"
              role="tab"
              aria-selected="false"
              aria-controls="panel-vespertino"
              onclick="agSwitchTab('vespertino')">Vespertino</button>
    </div>

    <div class="ag-header-meta">
      <div class="ag-live">
        <div class="ag-live-dot"></div>
        En Vivo
      </div>
      <div class="ag-clock" id="ag-reloj">--:--:--</div>
    </div>

  </header>


  <!-- ════════════════════════════════════════════════════════════
       PANELES
       ════════════════════════════════════════════════════════════ -->
  <main class="ag-content">

    <div class="ag-panel active" id="panel-matutino"
         role="tabpanel" aria-labelledby="tab-matutino">
      <div class="ag-panel-label">Jornada Matutina &mdash; hasta las 13:00 h</div>
      <div class="ag-timeline" id="tl-matutino"></div>
    </div>

    <div class="ag-panel" id="panel-vespertino"
         role="tabpanel" aria-labelledby="tab-vespertino">
      <div class="ag-panel-label">Jornada Vespertina &mdash; desde las 14:00 h</div>
      <div class="ag-timeline" id="tl-vespertino"></div>
    </div>

  </main>


  <!-- ════════════════════════════════════════════════════════════
       FOOTER
       ════════════════════════════════════════════════════════════ -->
  <footer class="ag-footer">
    <span class="ag-footer-date" id="ag-fecha">Sábado 11 de Abril, 2026</span>
    <span class="ag-footer-brand">KDO Broadcast Events Panel</span>
  </footer>

</div>

<script src="../js/agenda-view.js"></script>
</body>
</html>
